<ul>
    @for (product of products; track product.id) {
      <li class="product-item">
        <button [routerLink]="['/products', product.id]">
          <img
            [src]="product.imageUrl"
            [alt]="'product plaatje niet ingeladen'"
          />
        </button>
        <h3>{{ product.name }}</h3>
        <button (click)="addProductToCart()">Voeg toe aan mandje</button>
      </li>
    }
  </ul>
