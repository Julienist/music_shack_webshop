<!-- 2e versie winkelmandje page, met mat-table -->
<h2>Winkelmandje</h2>
<table mat-table [dataSource]="cartItems()" class="cartTable" *ngIf="cartItems().length > 0; else emptyCart">
  @for (item of cartItems(); track item.id) {
    <ng-container matColumnDef="image">
      <th mat-header-cell *matHeaderCellDef>Afbeelding</th>
      <td mat-cell *matCellDef="let item">
        <img [src]="item.imageurl" alt="{{ item.name }}" class="product-image">
      </td>
    </ng-container>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Naam</th>
      <td mat-cell *matCellDef="let item">{{ item.name }}</td>
    </ng-container>
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Prijs</th>
      <td mat-cell *matCellDef="let item">
        €{{ item.price }}
      </td>
    </ng-container>
    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Aantal</th>
      <td mat-cell *matCellDef="let item">
        <input type="number" [(ngModel)]="item.quantity" min="1" />
      </td>
    </ng-container>
    <ng-container matColumnDef="remove">
      <th mat-header-cell *matHeaderCellDef>Verwijderen</th>
      <td mat-cell *matCellDef="let item">
        <button (click)="removeItem(item.id)">Verwijderen</button>
      </td>
    </ng-container>
    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef>Totaal</th>
      <td mat-cell *matCellDef="let item">
        €{{ item.price * item.quantity }}
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
  }
</table>
<h1 *ngIf="cartItems().length > 0">Totale prijs: €{{ totalPrice() }}</h1>

<button mat-stroked-button routerLink="/afrekenen">Afrekenen</button>
<button mat-stroked-button *ngIf="cartItems().length > 0" (click)="clearCart()">Winkelmandje leegmaken</button>

<ng-template #emptyCart>
  <h1>Je winkelmandje is leeg.</h1>
</ng-template>
