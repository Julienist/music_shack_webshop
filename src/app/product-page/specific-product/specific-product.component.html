<img *ngIf="product()" [src]="product()?.imageUrl" alt="Productafbeelding">
<section *ngIf="product()">
  <h2>{{ product()?.name }}</h2>
  <p>ID: {{ product()?.id }}</p>
  <p>{{ product()?.description }}</p>
  <p>Prijs: €{{ product()?.price }}</p>
  <p>Voorraad: {{ product()?.amountInStock }}</p>
</section>

<div *ngIf="!product()">Product niet gevonden.</div>
