<section>
    <h2>{{ title | translate }}</h2>
    @if (isFetching() && !error()) {
        <p class="fallback-text">Verkijgen van producten...</p>
    }

    @if (error()) {
        <p class="fallback-text">{{ error() }}</p>
    }

    @if (productList() && productList().length > 0) {
        <app-product [products]="productList()" />
    } @else {
        <p class="fallback-text">Het in laden van de producten is niet gelukt.</p>
    }
</section>
