<section>
    @if (isFetching() && !error()) {
        <p class="fallback-text">Verkijgen van producten...</p>
    }

    @if (error()) {
        <p class="fallback-text">{{ error() }}</p>
    }

    @if (products() && products().length > 0) {
        <app-product [products]="products()" class="product-card"></app-product>
    } @else {
        <p class="fallback-text">Geen producten gevonden.</p>
    }
</section>
