spring.application.name=${SPRING_APPLICATION_NAME_MUSIC_SHACK}
spring.datasource.url=${SPRING_DATASOURCE_URL_MUSIC_SHACK}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME_MUSIC_SHACK}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD_MUSIC_SHACK}

spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=20000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = ${SPRING_JPA_HIBERNATE_DDL_AUTO}

server.error.include-message=always
server.port=${BACKEND_SERVER_PORT:8080}
server.servlet.context-path=/api

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
